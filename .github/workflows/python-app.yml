# This workflow will install Python dependencies, run tests and lint with multiple versions of Python and on different operating systems
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest]
        numpy-version: ['latest', '1.x']
        include:
          - python-version: '3.9'
            os: ubuntu-latest
            numpy-version: 'latest'
            code-cov: true
        exclude:
          - python-version: '3.13'
            numpy-version: '1.x'
          - python-version: '3.14'
            numpy-version: '1.x'
      fail-fast: false
      max-parallel: 1

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        if [ "${{ matrix.numpy-version }}" = "1.x" ]; then
          uv sync
          uv pip install pytest pytest-cov 'numpy<2'
        else
          uv sync --extra test
        fi
    - name: Test with pytest
      run: |
        if [ "${{ matrix.code-cov }}" = "true" ]; then
          codecov='--cov=benchmark_simulator --cov-report=xml --cov-config=.coveragerc';
        fi
        uv run pytest -W ignore -v $codecov tests
    - name: Upload coverage
      if: matrix.code-cov && always()
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: true
        verbose: true
