# This workflow will install Python dependencies, run tests and lint with multiple versions of Python and on different operating systems
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        python-version: ['3.9', '3.10']
        os: [ubuntu-latest, macos-latest]
        include:
          - python-version: '3.9'
            os: ubuntu-latest
            code-cov: true
      fail-fast: false
      max-parallel: 1

    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --extra test
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 120 chars wide
        uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
    - name: Test with pytest
      run: |
        if [ "${{ matrix.code-cov }}" = "true" ]; then
          codecov='--cov=benchmark_simulator --cov-report=xml --cov-config=.coveragerc';
        fi
        uv run pytest -W ignore -v $codecov tests
    - name: Upload coverage
      if: matrix.code-cov && always()
      uses: codecov/codecov-action@v4
      with:
        fail_ci_if_error: true
        verbose: true
